<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For my Mai Juju</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            background-color: #fff0f5;
            text-align: center;
            padding: 20px;
        }
        .photo-container { 
            position: relative; 
            width: 300px; 
            height: 300px; 
            margin-bottom: 20px; 
            background-color: #eee; /* Shows grey box if image is missing */
            border-radius: 15px;
        }
        .slide {
            width: 100%; height: 100%; object-fit: cover; border-radius: 15px;
            position: absolute; top: 0; left: 0;
            opacity: 0; transition: opacity 1s;
        }
        .slide.active { opacity: 1; }
        button { padding: 10px 25px; margin: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="container">
        <div class="photo-container">
            <!-- Ensure filenames match EXACTLY what you see in GitHub -->
            <img src="photo1.jpg" class="slide active" onerror="this.style.display='none'">
            <img src="photo2.jpg" class="slide" onerror="this.style.display='none'">
            <img src="photo3.jpg" class="slide" onerror="this.style.display='none'">
            <img src="photo4.jpg" class="slide" onerror="this.style.display='none'">
            <img src="photo5.jpg" class="slide" onerror="this.style.display='none'">
        </div>
        
        <h1>Hey Mai Juju, date this Tuesday or Thursday?</h1>
        <button onclick="alert('Yay!')">Yes!</button>
    </div>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        setInterval(() => {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }, 3000);
    </script>
</body>
</html>
