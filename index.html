<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>For my Mai Juju</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: #ffe4e9; font-family: 'Segoe UI', sans-serif; text-align: center; overflow: hidden; }
        
        .puzzle-grid { 
            display: grid; grid-template-columns: 150px 150px; grid-template-rows: 150px 150px; 
            width: 300px; height: 300px; margin-bottom: 10px; border: 5px solid #d63384; border-radius: 15px; overflow: hidden;
        }
        .piece { width: 150px; height: 150px; overflow: hidden; position: relative; background: #ffcad4; }
        .piece img { width: 300px; height: 300px; object-fit: cover; position: absolute; opacity: 0; transition: opacity 1s; }
        .piece img.active { opacity: 1; }
        
        .p1 img { top: 0; left: 0; }
        .p2 img { top: 0; left: -150px; }
        .p3 img { top: -150px; left: 0; }
        .p4 img { top: -150px; left: -150px; }

        .buttons { margin-top: 20px; display: flex; gap: 20px; justify-content: center; align-items: center; height: 60px; }
        button { padding: 10px 25px; font-size: 16px; cursor: pointer; border: none; border-radius: 20px; font-weight: bold; transition: none; }
        #yesBtn { background-color: #ff4d6d; color: white; }
        #noBtn { background-color: #888; color: white; position: absolute; }
        
        #final-screen { display: none; padding: 20px; position: relative; z-index: 10; }
        .verse { margin-top: 30px; font-style: italic; color: #555; font-size: 1.1em; }
        #timer { font-size: 1.2em; color: #d63384; font-weight: bold; margin-bottom: 10px; }

        .heart { 
            position: absolute; top: -10%; color: #d63384; font-size: 24px; 
            animation: fall linear forwards; z-index: 1000; pointer-events: none; 
        }
        @keyframes fall { to { transform: translateY(110vh); } }
    </style>
</head>
<body>

    <div id="container">
        <div id="timer"></div>
        <div class="puzzle-grid">
            <div class="piece p1"><img src="photo1.jpg" class="img1 active"><img src="photo2.jpg" class="img2"><img src="photo3.jpg" class="img3"><img src="photo4.jpg" class="img4"><img src="photo5.jpg" class="img5"></div>
            <div class="piece p2"><img src="photo1.jpg" class="img1 active"><img src="photo2.jpg" class="img2"><img src="photo3.jpg" class="img3"><img src="photo4.jpg" class="img4"><img src="photo5.jpg" class="img5"></div>
            <div class="piece p3"><img src="photo1.jpg" class="img1 active"><img src="photo2.jpg" class="img2"><img src="photo3.jpg" class="img3"><img src="photo4.jpg" class="img4"><img src="photo5.jpg" class="img5"></div>
            <div class="piece p4"><img src="photo1.jpg" class="img1 active"><img src="photo2.jpg" class="img2"><img src="photo3.jpg" class="img3"><img src="photo4.jpg" class="img4"><img src="photo5.jpg" class="img5"></div>
        </div>
        
        <h1>Hey Mai Juju, movie date this Tuesday or Thursday?</h1>
        <div class="buttons">
            <button id="yesBtn" onclick="showFinal()">Yes!</button>
            <button id="noBtn" onmouseover="moveNo()">No</button>
        </div>
    </div>

    <div id="final-screen" class="animate__animated animate__zoomIn">
        <h2 style="color: #d63384;">Ndokuda nemoyo wese mangwenya ❤️</h2>
        <div class="verse">
            <p>"Many women do noble things, but you surpass them all." – Proverbs 31:29</p>
        </div>
    </div>

    <script>
        // Timer calculation
        const start = new Date("2022-06-15");
        const today = new Date();
        const diffDays = Math.ceil(Math.abs(today - start) / (1000 * 60 * 60 * 24));
        document.getElementById("timer").innerText = diffDays + " days together and counting!";

        // Puzzle slideshow
        let current = 1;
        setInterval(() => {
            document.querySelectorAll('.active').forEach(el => el.classList.remove('active'));
            current = (current % 5) + 1;
            document.querySelectorAll(`.img${current}`).forEach(el => el.classList.add('active'));
        }, 3000);

        // Fast moving No button
        function moveNo() {
            const btn = document.getElementById('noBtn');
            btn.style.left = Math.random() * (window.innerWidth - 80) + 'px';
            btn.style.top = Math.random() * (window.innerHeight - 50) + 'px';
        }

        // Final screen
        function showFinal() {
            document.getElementById('container').style.display = 'none';
            document.getElementById('final-screen').style.display = 'block';
            for(let i=0; i<40; i++) {
                const heart = document.createElement('div');
                heart.innerHTML = '❤️';
                heart.className = 'heart';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
                document.body.appendChild(heart);
            }
        }
    </script>
</body>
</html>
