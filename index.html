<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For my Mai Juju</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: #fff0f5; font-family: 'Segoe UI', sans-serif; text-align: center; overflow: hidden; }
        
        .photo-container { 
            position: relative; width: 300px; height: 300px; margin-bottom: 20px; 
            clip-path: path('M150 270 C 150 270 20 180 20 100 C 20 40 70 20 100 20 C 130 20 150 50 150 50 C 150 50 170 20 200 20 C 230 20 280 40 280 100 C 280 180 150 270 150 270 Z');
            background-color: #ffcad4;
        }
        
        .slide { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; opacity: 0; transition: opacity 1s ease-in-out; }
        .slide.active { opacity: 1; }

        .buttons { margin-top: 30px; position: relative; width: 300px; height: 100px; }
        button { padding: 15px 30px; font-size: 18px; margin: 10px; cursor: pointer; border: none; border-radius: 25px; font-weight: bold; position: absolute; transition: all 0.2s ease; }
        #yesBtn { background-color: #ff4d6d; color: white; left: 20px; animation: pulse 2s infinite; }
        #noBtn { background-color: #888; color: white; right: 20px; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        #message { display: none; font-size: 32px; color: #d63384; font-weight: bold; padding: 20px; }
    </style>
</head>
<body>

    <div id="container">
        <div class="photo-container">
            <img src="photo1.jpg" class="slide active">
            <img src="photo2.jpg" class="slide">
            <img src="photo3.jpg" class="slide">
            <img src="photo4.jpg" class="slide">
            <img src="photo5.jpg" class="slide">
        </div>
        
        <h1>Hey Mai Juju, would you like to go on a movie date with me?</h1>
        <div class="buttons">
            <button id="yesBtn" onclick="accept()">Yes!</button>
            <button id="noBtn" onmouseover="moveButton()">No</button>
        </div>
    </div>

    <div id="message" class="animate__animated animate__zoomIn">
        Ndokuda nemoyo wese mangwana waMhofu ❤️
    </div>

    <script>
        // Slideshow
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        setInterval(() => {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }, 3000);

        // Dodging "No" button
        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            noBtn.style.position = 'fixed';
            noBtn.style.left = Math.random() * (window.innerWidth - 100) + 'px';
            noBtn.style.top = Math.random() * (window.innerHeight - 100) + 'px';
        }

        // Acceptance with Confetti
        function accept() {
            document.getElementById('container').style.display = 'none';
            document.getElementById('message').style.display = 'block';
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }
    </script>
</body>
</html>
