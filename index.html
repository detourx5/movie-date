<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>For my Mai Juju</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: #fff0f5; font-family: 'Segoe UI', sans-serif; text-align: center; overflow: hidden; }
        
        .puzzle-container { 
            position: relative; width: 300px; height: 300px; margin-bottom: 20px;
            clip-path: polygon(0% 20%, 30% 20%, 30% 0%, 70% 0%, 70% 20%, 100% 20%, 100% 100%, 0% 100%);
            background-color: #d63384;
        }
        
        .slide { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; opacity: 0; transition: opacity 1s ease-in-out; }
        .slide.active { opacity: 1; }

        .buttons { margin-top: 30px; position: relative; width: 300px; height: 100px; }
        button { padding: 15px 30px; font-size: 18px; margin: 10px; cursor: pointer; border: none; border-radius: 25px; font-weight: bold; position: absolute; transition: all 0.2s ease; }
        #yesBtn { background-color: #ff4d6d; color: white; left: 20px; }
        #noBtn { background-color: #888; color: white; right: 20px; }
        
        #final-screen { display: none; padding: 20px; }
        .verse { margin-top: 50px; font-style: italic; color: #555; font-size: 0.9em; }
    </style>
</head>
<body>

    <div id="container">
        <div class="puzzle-container">
            <img src="photo1.jpg" class="slide active">
            <img src="photo2.jpg" class="slide">
            <img src="photo3.jpg" class="slide">
            <img src="photo4.jpg" class="slide">
            <img src="photo5.jpg" class="slide">
        </div>
        
        <h1>Hey Mai Juju, movie date this Tuesday or Thursday?</h1>
        <div class="buttons">
            <button id="yesBtn" onclick="showFinal()">Yes!</button>
            <button id="noBtn" onmouseover="moveButton()">No</button>
        </div>
    </div>

    <div id="final-screen" class="animate__animated animate__zoomIn">
        <h2 style="color: #d63384;">Ndokuda nemoyo wese mukadzi wamhofu ❤️</h2>
        <div class="verse">
            <p>"Many women do noble things, but you surpass them all." – Proverbs 31:29</p>
        </div>
    </div>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        setInterval(() => {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }, 3000);

        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            noBtn.style.position = 'fixed';
            noBtn.style.left = Math.random() * (window.innerWidth - 100) + 'px';
            noBtn.style.top = Math.random() * (window.innerHeight - 100) + 'px';
        }

        function showFinal() {
            document.getElementById('container').style.display = 'none';
            document.getElementById('final-screen').style.display = 'block';
            confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
        }
    </script>
</body>
</html>
